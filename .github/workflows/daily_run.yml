name: LinkedIn Auto-Poster

on:
  schedule:
    # Runs at 09:00 AM UTC daily
    - cron: '0 9 * * *'
  # Allows manual testing button
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          G_SHEET_ID: ${{ secrets.G_SHEET_ID }}
          G_CREDS_B64: ${{ secrets.G_CREDS_B64 }}
        run: python main.py
